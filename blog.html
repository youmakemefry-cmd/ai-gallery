<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | DualVisor</title>
    <style>
        :root {
            --bg-color: #0c0c10;
            --card-bg: #14141c;
            --accent: #7c3aed;
            --accent-cyan: #00f0ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: all 0.3s var(--easing);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Фокус-состояния (WCAG 2.2) */
        a:focus-visible, 
        button:focus-visible {
            outline: 2px solid var(--accent-cyan);
            outline-offset: 3px;
        }

        /* Стилизация скроллбара */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* --- GLASS HEADER --- */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(20, 20, 28, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: #2d2d38;
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
        }
        .nav-brand .dual { 
            color: var(--accent-cyan); 
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .nav-brand .visor { 
            color: var(--accent); 
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
        }

        .header-nav {
            display: flex;
            gap: 18px;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            padding-bottom: 4px;
        }

        .header-nav a:hover, .header-nav a.active {
            color: var(--text-main);
        }

        .header-nav a.active {
            border-bottom-color: var(--accent);
        }

        /* --- BLOG CONTENT --- */
        .blog-container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .blog-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .blog-card h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--text-main);
            font-size: 1.6rem;
            font-weight: 600;
        }

        .blog-date {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .blog-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            background: #000;
        }

        .blog-text {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 1.05rem;
            margin: 0;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            padding: 40px;
        }

        /* --- FOOTER --- */
        .site-footer {
            background: #09090d;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 25px 15px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 40px;
        }
        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .footer-content span.copyright {
            white-space: nowrap;
        }
        .footer-icon {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .footer-icon:hover {
            color: var(--accent-cyan);
            transform: translateY(-2px);
        }
        .footer-separator {
            color: #252530;
            font-size: 1.1rem;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 1000px) {
            .glass-header { padding: 12px 15px; }
            .nav-brand { font-size: 1.1rem; }
            .header-nav { gap: 15px; }
            .blog-container { margin-top: 20px; gap: 20px; }
            .blog-card { padding: 20px; }
            .blog-card h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="index.html" class="header-left">
            <img src="logo.png" alt="Logo" class="nav-icon" onerror="this.style.display='none'"> 
            <div class="nav-brand">
                <span class="dual">DUAL</span><span class="visor">VISOR</span>
            </div>
        </a>
        <nav class="header-nav">
    <a href="index.html">Gallery</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
    <a href="contacts.html">Contacts</a>
</nav>
    </header>

    <main class="blog-container" id="blog-container">
        <div class="loading-text">Loading posts...</div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="copyright">&copy; 2026 Sergei N.</span>
            <span class="footer-separator">|</span>
            <a href="mailto:esw1337@gmail.com" class="footer-icon" title="Email me">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </a>
            <span class="footer-separator">|</span>
            <a href="https://github.com/youmakemefry-cmd" target="_blank" class="footer-icon" title="GitHub">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('blog-container');

            async function loadBlogPosts() {
                try {
                    const response = await fetch('./blog.json');
                    if (!response.ok) throw new Error('Cannot load blog.json');
                    
                    const posts = await response.json();
                    container.innerHTML = ''; 

                    if (posts.length === 0) {
                        container.innerHTML = '<div class="loading-text">No posts found.</div>';
                        return;
                    }

                    posts.forEach(post => {
                        const article = document.createElement('article');
                        article.className = 'blog-card';

                        const title = document.createElement('h2');
                        title.textContent = post.title;

                        const date = document.createElement('span');
                        date.className = 'blog-date';
                        date.textContent = post.date;

                        article.appendChild(title);
                        article.appendChild(date);

                        if (post.image && post.image.trim() !== '') {
                            const img = document.createElement('img');
                            img.className = 'blog-image';
                            img.src = post.image;
                            img.alt = post.title;
                            img.onerror = () => img.style.display = 'none'; 
                            article.appendChild(img);
                        }

                        const text = document.createElement('p');
                        text.className = 'blog-text';
                        text.innerHTML = post.content; 

                        article.appendChild(text);
                        container.appendChild(article);
                    });

                } catch (error) {
                    console.error("Error loading blog:", error);
                    container.innerHTML = '<div class="loading-text">Error loading blog posts. Did you create blog.json?</div>';
                }
            }

            loadBlogPosts();
        });
    </script>
</body>
</html>
