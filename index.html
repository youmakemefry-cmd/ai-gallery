<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROVISTA Gallery</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1a1a21;
            --accent: #7c3aed;
            --accent-cyan: #00f0ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0; /* Убрали паддинг для прилипающей шапки */
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- GLASS HEADER --- */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(26, 26, 33, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        /* Заглушка для иконки 64x64px */
        .nav-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px; /* Скругленный квадрат */
            object-fit: cover;
            background: #2d2d38; /* Фон пока нет картинки */
        }

        /* Текстовый логотип */
        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
        }
        .nav-brand .neuro { color: var(--accent-cyan); }
        .nav-brand .vista { color: var(--accent); }

        .header-nav {
            display: flex;
            gap: 25px;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-nav a:hover, .header-nav a.active {
            color: var(--text-main);
        }

        .header-nav a.active {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 4px;
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР ГАЛЕРЕИ --- */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1; /* Чтобы подвал всегда был внизу */
            width: 100%;
            box-sizing: border-box;
        }

        /* --- ЛАЙТБОКС С НАВИГАЦИЕЙ --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 14, 0.95);
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }

        .lb-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            z-index: 10001;
        }
        .lb-close:hover { opacity: 1; }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            padding: 20px;
            opacity: 0.5;
            transition: opacity 0.2s;
            z-index: 10001;
        }
        .lb-nav:hover { opacity: 1; }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }

        /* --- КОМПОНЕНТЫ ПОЛОК --- */
        .folder-row {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            align-items: stretch;
            min-width: 0;
        }

        .folder-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d38;
            padding-bottom: 15px;
            margin: 0;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }

        .folder-title-wrapper {
            position: relative;
            flex: 1 1 0px;
            min-width: 0;
            margin-right: 15px;
        }

        .folder-title {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-muted);
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: block;
            width: 100%;
        }

        .folder-title-wrapper::after {
            content: attr(data-full-title);
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: #374151;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: normal;
            word-break: break-word;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
            transform: translateY(-5px);
            z-index: 100;
            pointer-events: none;
            width: max-content;
            max-width: calc(100vw - 60px);
        }

        .folder-title-wrapper:hover::after,
        .folder-title-wrapper:active::after {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .image-count {
            font-size: 1rem;
            opacity: 0.6;
            margin-left: 6px;
            white-space: nowrap;
            font-weight: normal;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .toggle-checkbox {
            appearance: none;
            width: 40px;
            height: 22px;
            background: #2d2d38;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.3s;
        }

        .toggle-checkbox::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-checkbox:checked {
            background: var(--accent);
        }
        .toggle-checkbox:checked::after {
            transform: translateX(18px);
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            cursor: zoom-in;
        }

        .slider-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        .img-modified {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        .slider-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 10;
            cursor: ew-resize;
        }

        .slider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background-color: var(--accent);
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.8);
        }

        .slider-line::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background-color: var(--bg-color);
            border: 3px solid var(--accent);
            border-radius: 50%;
        }

        .thumbnails-wrapper {
            position: relative;
            min-height: 100%;
        }

        .thumbnails-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b4b5c #1a1a21;
        }

        .thumbnails-container::-webkit-scrollbar {
            width: 8px;
        }
        .thumbnails-container::-webkit-scrollbar-track {
            background: #1a1a21;
            border-radius: 4px;
        }
        .thumbnails-container::-webkit-scrollbar-thumb {
            background: #4b4b5c;
            border-radius: 4px;
        }
        .thumbnails-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .thumbnail-card {
            background: #25252e;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 0;
            min-height: 110px; 
            box-sizing: border-box;
        }

        .thumbnail-card:hover {
            transform: translateY(-2px);
            background: #2c2c36;
        }

        .thumbnail-card.active {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        .thumbnail-card img {
            width: 100%;
            height: 100%;
            flex: 1; 
            object-fit: cover;
            border-radius: 4px;
            min-height: 0; 
        }

        .thumbnail-label {
            flex: 0 0 auto;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-muted);
            word-break: break-all;
        }
        
        .badge {
            display: inline-block;
            background: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        
        .badge.original {
            background: #374151;
        }

        /* --- FOOTER --- */
        .site-footer {
            background: #121216;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 40px;
        }
        .site-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }
        .site-footer a:hover {
            color: var(--accent-cyan);
        }
        .footer-content {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* --- АДАПТИВНОСТЬ МОБИЛЬНЫХ --- */
        @media (max-width: 1000px) {
            .glass-header {
                padding: 12px 15px;
            }
            .nav-brand {
                font-size: 1.1rem;
            }
            .header-nav {
                gap: 15px;
            }
            
            .gallery-container {
                gap: 20px;
                margin-top: 20px;
                padding: 0 10px;
            }

            .folder-title { font-size: 0.95rem; }
            .image-count { display: none; }

            .folder-row {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 20px;
                box-sizing: border-box;
            }

            .slider-wrapper { width: 100%; min-width: 0; }
            .thumbnails-wrapper { height: 145px; min-height: auto; width: 100%; min-width: 0; }

            .thumbnails-container {
                position: relative;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                align-items: center;
                padding-bottom: 10px;
            }

            .thumbnail-card {
                width: 130px;
                height: 125px;
                flex: 0 0 auto;
                padding: 8px;
            }
            .thumbnail-card img { width: 100%; height: 75px; flex: none; }
            .thumbnail-label { font-size: 0.75rem; }
            
            /* Скрываем стрелочки на мобилках (оставляем только свайп) */
            .lb-nav { display: none; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="index.html" class="header-left">
            <img src="logo.png" alt="Logo" class="nav-icon" onerror="this.style.display='none'"> 
            <div class="nav-brand">
                <span class="neuro">NEURO</span><span class="vista">VISTA</span>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="active">Gallery</a>
            <a href="blog.html">Blog</a>
            <a href="contacts.html">Contacts</a>
        </nav>
    </header>

    <div class="lightbox" id="lightbox">
        <div class="lb-close" id="lb-close">&times;</div>
        <div class="lb-nav lb-prev" id="lb-prev">&lsaquo;</div>
        <img id="lightbox-img" src="" alt="Full size view">
        <div class="lb-nav lb-next" id="lb-next">&rsaquo;</div>
    </div>

    <main class="gallery-container" id="gallery"></main>

    <footer class="site-footer">
        <div class="footer-content">
            <span>&copy; 2026 Sergey N.</span>
            <span>|</span>
            <span><a href="mailto:esw1337@gmail.com">esw1337@gmail.com</a></span>
            <span>|</span>
            <span><a href="https://github.com/youmakemefry-cmd" target="_blank">GitHub</a></span>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gallery = document.getElementById('gallery');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            // --- Глобальный массив для сквозного свайпа ---
            let globalImages = [];
            let currentLbIndex = -1;

            // Навигация лайтбокса
            function openLightbox(src) {
                currentLbIndex = globalImages.indexOf(src);
                if (currentLbIndex === -1) currentLbIndex = 0; // Фолбек
                updateLightboxImage();
                lightbox.style.display = 'flex';
            }

            function updateLightboxImage() {
                if (currentLbIndex >= 0 && currentLbIndex < globalImages.length) {
                    lightboxImg.src = globalImages[currentLbIndex];
                }
            }

            function prevImage() {
                if (currentLbIndex > 0) {
                    currentLbIndex--;
                    updateLightboxImage();
                }
            }

            function nextImage() {
                if (currentLbIndex < globalImages.length - 1) {
                    currentLbIndex++;
                    updateLightboxImage();
                }
            }

            // Управление лайтбоксом (Клики)
            document.getElementById('lb-close').addEventListener('click', () => lightbox.style.display = 'none');
            document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
            document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
            
            // Клик по фону закрывает (но не по картинке)
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) lightbox.style.display = 'none';
            });

            // Управление лайтбоксом (Клавиатура)
            document.addEventListener('keydown', (e) => {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') lightbox.style.display = 'none';
                    if (e.key === 'ArrowLeft') prevImage();
                    if (e.key === 'ArrowRight') nextImage();
                }
            });

            // Управление лайтбоксом (Свайпы)
            let touchStartX = 0;
            let touchEndX = 0;
            lightbox.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            lightbox.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
            function handleSwipe() {
                const threshold = 50; // Минимальная длина свайпа
                if (touchEndX < touchStartX - threshold) nextImage();
                if (touchEndX > touchStartX + threshold) prevImage();
            }


            async function loadAllFolders() {
                try {
                    const response = await fetch('./gallery.json');
                    if (!response.ok) throw new Error('Cannot load gallery.json');
                    const data = await response.json();
                    
                    const customTitles = data._titles || {};
                    
                    const sortedFolders = Object.keys(data)
                        .filter(key => key !== '_titles')
                        .sort((a, b) => parseInt(a) - parseInt(b));
                    
                    for (const folderNum of sortedFolders) {
                        const currentTitle = customTitles[folderNum] ? customTitles[folderNum] : `Folder #${folderNum}`;
                        
                        // Заполняем глобальный массив для свайпов (сохраняем порядок)
                        data[folderNum].forEach(img => {
                            globalImages.push(`${folderNum}/${img}`);
                        });

                        createFolderBlock(folderNum, data[folderNum], currentTitle);
                    }
                } catch (error) {
                    console.error("Error loading gallery:", error);
                    gallery.innerHTML = '<p style="text-align:center">Error loading gallery.json. Did you create it?</p>';
                }
            }

            function createFolderBlock(folderNum, images, folderTitle) {
                const row = document.createElement('div');
                row.className = 'folder-row';
                
                const header = document.createElement('div');
                header.className = 'folder-header';
                
                const titleWrapper = document.createElement('div');
                titleWrapper.className = 'folder-title-wrapper';
                titleWrapper.setAttribute('data-full-title', folderTitle); 
                
                const title = document.createElement('h3');
                title.className = 'folder-title';
                title.innerHTML = `${folderTitle} <span class="image-count">(${images.length} images)</span>`;
                
                titleWrapper.appendChild(title);
                
                const toggleLabel = document.createElement('label');
                toggleLabel.className = 'toggle-label';
                
                const toggleCheckbox = document.createElement('input');
                toggleCheckbox.type = 'checkbox';
                toggleCheckbox.className = 'toggle-checkbox';
                toggleCheckbox.checked = true;
                
                toggleLabel.append(toggleCheckbox, " Compare");
                header.append(titleWrapper, toggleLabel);
                row.appendChild(header);

                const sliderWrapper = document.createElement('div');
                sliderWrapper.className = 'slider-wrapper';

                const imgOriginal = document.createElement('img');
                imgOriginal.className = 'img-original';
                
                const imgModified = document.createElement('img');
                imgModified.className = 'img-modified';

                const originalSrc = `${folderNum}/${images[0]}`;
                let activeSrc = `${folderNum}/${images[1]}`; 

                imgOriginal.src = originalSrc;
                imgModified.src = activeSrc; 

                let startPos = 50;
                if (window.innerWidth > 1000) {
                    const positions = [10, 25, 25, 50, 50, 75, 75, 90];
                    startPos = positions[Math.floor(Math.random() * positions.length)];
                }

                const sliderInput = document.createElement('input');
                sliderInput.type = 'range';
                sliderInput.min = '0';
                sliderInput.max = '100';
                sliderInput.value = startPos;
                sliderInput.className = 'slider-input';

                const sliderLine = document.createElement('div');
                sliderLine.className = 'slider-line';
                
                sliderLine.style.left = `${startPos}%`;
                imgModified.style.clipPath = `polygon(${startPos}% 0, 100% 0, 100% 100%, ${startPos}% 100%)`;

                function updateDisplayMode() {
                    if (toggleCheckbox.checked) {
                        sliderInput.style.display = 'block';
                        sliderLine.style.display = 'block';
                        imgModified.style.display = 'block';
                        imgOriginal.src = originalSrc;
                        imgModified.src = activeSrc;
                    } else {
                        sliderInput.style.display = 'none';
                        sliderLine.style.display = 'none';
                        imgModified.style.display = 'none';
                        imgOriginal.src = activeSrc;
                    }
                }

                sliderInput.addEventListener('input', (e) => {
                    const value = e.target.value;
                    imgModified.style.clipPath = `polygon(${value}% 0, 100% 0, 100% 100%, ${value}% 100%)`;
                    sliderLine.style.left = `${value}%`;
                });

                sliderWrapper.addEventListener('click', (e) => {
                    if (e.target === sliderInput) return; 
                    openLightbox(activeSrc);
                });

                toggleCheckbox.addEventListener('change', updateDisplayMode);

                sliderWrapper.append(imgOriginal, imgModified, sliderInput, sliderLine);
                row.appendChild(sliderWrapper);

                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'thumbnails-wrapper';

                const thumbContainer = document.createElement('div');
                thumbContainer.className = 'thumbnails-container';
                thumbWrapper.appendChild(thumbContainer);
                row.appendChild(thumbWrapper);

                for (let i = 0; i < images.length; i++) {
                    const thumbCard = document.createElement('div');
                    thumbCard.className = 'thumbnail-card';
                    
                    if (i === 1) thumbCard.classList.add('active'); 
                    
                    const label = document.createElement('div');
                    label.className = 'thumbnail-label';
                    
                    const badgeText = i === 0 ? "ORIGINAL" : `AI VARIATION ${i}`;
                    const badgeClass = i === 0 ? "badge original" : "badge";
                    
                    label.innerHTML = `<span class="${badgeClass}">${badgeText}</span>`;
                    
                    const thumbImg = document.createElement('img');
                    const imgPath = `${folderNum}/${images[i]}`;
                    thumbImg.src = imgPath;
                    
                    thumbCard.append(label, thumbImg);
                    thumbContainer.appendChild(thumbCard);

                    thumbCard.addEventListener('click', () => {
                        if (thumbCard.classList.contains('active')) {
                            openLightbox(imgPath);
                            return;
                        }
                        
                        // ЛОГИКА ОТКЛЮЧЕНИЯ COMPARE: Если тапнули по Оригиналу
                        if (i === 0) {
                            toggleCheckbox.checked = false;
                        }

                        activeSrc = imgPath;
                        const allThumbs = thumbContainer.querySelectorAll('.thumbnail-card');
                        allThumbs.forEach(t => t.classList.remove('active'));
                        thumbCard.classList.add('active');
                        
                        updateDisplayMode();
                    });
                }

                gallery.appendChild(row);
            }

            loadAllFolders();
        });
    </script>
</body>
</html>
