<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualVisor AI Gallery Enhanced</title>
    <style>
        /* ==========================================================================
           NORMALIZE.CSS (v8.0.1) - Обеспечивает кроссбраузерную консистентность
           ========================================================================== */
        html {
          line-height: 1.15;
          -webkit-text-size-adjust: 100%;
        }
        body {
          margin: 0;
        }
        main {
          display: block;
        }
        h1 {
          font-size: 2em;
          margin: 0.67em 0;
        }
        hr {
          box-sizing: content-box;
          height: 0;
          overflow: visible;
        }
        pre {
          font-family: monospace, monospace;
          font-size: 1em;
        }
        a {
          background-color: transparent;
        }
        abbr[title] {
          border-bottom: none;
          text-decoration: underline;
          text-decoration: underline dotted;
        }
        b, strong {
          font-weight: bolder;
        }
        code, kbd, samp {
          font-family: monospace, monospace;
          font-size: 1em;
        }
        small {
          font-size: 80%;
        }
        sub, sup {
          font-size: 75%;
          line-height: 0;
          position: relative;
          vertical-align: baseline;
        }
        sub {
          bottom: -0.25em;
        }
        sup {
          top: -0.5em;
        }
        img {
          border-style: none;
        }
        button, input, optgroup, select, textarea {
          font-family: inherit;
          font-size: 100%;
          line-height: 1.15;
          margin: 0;
        }
        button, input {
          overflow: visible;
        }
        button, select {
          text-transform: none;
        }
        button, [type="button"], [type="reset"], [type="submit"] {
          -webkit-appearance: button;
        }
        button::-moz-focus-inner, [type="button"]::-webkit-focus-inner, [type="reset"]::-moz-focus-inner, [type="submit"]::-moz-focus-inner {
          border-style: none;
          padding: 0;
        }
        button:-moz-focusring, [type="button"]:-moz-focusring, [type="reset"]:-moz-focusring, [type="submit"]:-moz-focusring {
          outline: 1px dotted ButtonText;
        }
        fieldset {
          padding: 0.35em 0.75em 0.625em;
        }
        legend {
          box-sizing: border-box;
          color: inherit;
          display: table;
          max-width: 100%;
          padding: 0;
          white-space: normal;
        }
        progress {
          vertical-align: baseline;
        }
        textarea {
          overflow: auto;
        }
        [type="checkbox"], [type="radio"] {
          box-sizing: border-box;
          padding: 0;
        }
        [type="number"]::-webkit-inner-spin-button, [type="number"]::-webkit-outer-spin-button {
          height: auto;
        }
        [type="search"] {
          -webkit-appearance: textfield;
          outline-offset: -2px;
        }
        [type="search"]::-webkit-search-decoration {
          -webkit-appearance: none;
        }
        ::-webkit-file-upload-button {
          -webkit-appearance: button;
          font: inherit;
        }
        details {
          display: block;
        }
        summary {
          display: list-item;
        }
        template {
          display: none;
        }
        [hidden] {
          display: none;
        }

        /* ==========================================================================
           ДИЗАЙН-СИСТЕМА И ОСНОВНОЙ КАРКАС
           ========================================================================== */
        :root {
            --bg-color: #0c0c10;
            --card-bg: #14141c;
            --accent: #7c3aed;
            --accent-cyan: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
            --transition: all 0.3s var(--easing);
        }

        body {
            margin: 0;
            padding: 0; 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: scroll;
        }

        a:focus-visible, 
        button:focus-visible, 
        input:focus-visible {
            outline: 2px solid var(--accent-cyan);
            outline-offset: 3px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
            transition: var(--transition);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ==========================================================================
           GLASS HEADER (Шапка сайта)
           ========================================================================== */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(20, 20, 28, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm); 
            object-fit: cover;
            background: #2d2d38; 
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
        }
        .nav-brand .dual { 
            color: var(--accent-cyan); 
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }
        .nav-brand .visor { 
            color: var(--accent); 
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
        }

        .header-nav {
            display: inline-flex;  
            align-items: center;   
            gap: 18px;             
        }

        @media (max-width: 600px) {
            .header-nav {
                gap: 10px !important;
            }
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            padding-top: 4px;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .header-nav a:hover, .header-nav a.active {
            color: var(--text-main);
        }

        .header-nav a.active {
            border-bottom-color: var(--accent);
        }

        /* ==========================================================================
           ОСНОВНОЙ КОНТЕЙНЕР ГАЛЕРЕИ
           ========================================================================== */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        /* ==========================================================================
           LIGHTBOX
           ========================================================================== */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 6, 9, 0.96);
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        
        .lb-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10002;
            width: 90%;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .lb-title-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .lb-filename-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }

        .lb-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.6;
            transition: var(--transition);
            z-index: 10003;
        }
        .lb-close:hover { 
            opacity: 1; 
            transform: scale(1.1);
        }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            padding: 20px;
            opacity: 0.5;
            transition: var(--transition);
            z-index: 10001;
        }
        .lb-nav:hover { 
            opacity: 1; 
            transform: translateY(-50%) scale(1.1);
        }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }

        /* Мобильная навигация внутри Lightbox */
        .lb-mobile-nav {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            gap: 20px;
            z-index: 10005;
        }
        .lb-mobile-nav button {
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .lb-mobile-nav button:active {
            background: var(--accent);
            border-color: var(--accent-cyan);
        }

        /* ==========================================================================
           КОМПОНЕНТЫ ПОЛОК (Folders)
           ========================================================================== */
        .folder-row {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            align-items: stretch;
            min-width: 0;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .folder-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
            margin: 0;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }

        .folder-title-wrapper {
            position: relative;
            flex: 1 1 0px;
            min-width: 0;
            margin-right: 15px;
        }

        .folder-title {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-main);
            font-weight: 600;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: block;
            width: 100%;
        }

        .folder-title-wrapper::after {
            content: attr(data-full-title);
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: #252530;
            color: #fff;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: normal;
            word-break: break-word;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            transform: translateY(-5px);
            z-index: 100;
            pointer-events: none;
            width: max-content;
            max-width: calc(100vw - 60px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .folder-title-wrapper:hover::after,
        .folder-title-wrapper:active::after {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .image-count {
            font-size: 1rem;
            color: var(--text-muted);
            margin-left: 6px;
            white-space: nowrap;
            font-weight: normal;
        }

        /* ==========================================================================
           КНОПКА COMPARE (Тумблер)
           ========================================================================== */
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .toggle-checkbox {
            appearance: none;
            width: 44px;
            height: 24px;
            background: #252530;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-checkbox::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-checkbox:checked {
            background: var(--accent);
        }
        .toggle-checkbox:checked::after {
            transform: translateX(20px);
        }

        @keyframes auraGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.8); }
            50% { box-shadow: 0 0 14px 6px rgba(0, 240, 255, 0.4); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }
        .toggle-checkbox.glow-active {
            animation: auraGlow 0.5s ease-out;
        }

        /* ==========================================================================
           ГЛАВНОЕ ОКНО ПРЕДПРОСМОТРА И СЛАЙДЕР СРАВНЕНИЯ
           ========================================================================== */
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: auto;
            max-height: 75vh;
            background: #060609;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y;
        }

        .slider-wrapper img.img-original {
            position: relative;
            display: block;
            width: 100%;
            height: auto;
            max-height: 75vh;
            object-fit: contain; 
            pointer-events: none;
        }

        .slider-wrapper img.img-modified {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            pointer-events: none;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        .slider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background-color: var(--accent-cyan);
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background-color: var(--bg-color);
            border: 3px solid var(--accent-cyan);
            border-radius: 50%;
            cursor: ew-resize;
            pointer-events: auto; 
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            transition: border-color 0.2s, color 0.2s, transform 0.2s;
            padding: 0;
        }

        .slider-handle:hover, .slider-wrapper.is-sliding .slider-handle {
            border-color: #fff;
            color: #fff;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-handle svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ==========================================================================
           МИНИАТЮРЫ (Thumbnails)
           ========================================================================== */
        .thumbnails-wrapper {
            position: relative;
            min-height: 100%;
        }

        .thumbnails-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(124, 58, 237, 0.3) transparent;
        }

        .thumbnails-container::-webkit-scrollbar {
            width: 6px;
        }
        .thumbnails-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .thumbnails-container::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 4px;
        }
        .thumbnails-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .thumbnail-card {
            background: #191924;
            border-radius: var(--radius-md);
            padding: 10px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 0;
            min-height: 110px; 
            box-sizing: border-box;
            position: relative;
        }

        .thumbnail-card:hover {
            transform: translateY(-2px);
            background: #20202e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .thumbnail-card.active {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.15);
        }

        .thumbnail-card img {
            width: 100%;
            height: 100%;
            flex: 1; 
            object-fit: cover;
            border-radius: var(--radius-sm);
            min-height: 0; 
        }

        .zoom-hint {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            backdrop-filter: blur(2px);
            transition: var(--transition);
            opacity: 0;
        }
        
        .thumbnail-card:hover .zoom-hint {
            opacity: 1;
        }

        .thumbnail-label {
            flex: 0 0 auto;
            font-size: 0.82rem;
            text-align: center;
            color: var(--text-muted);
            word-break: break-all;
            font-weight: 500;
        }
        
        .badge {
            display: inline-block;
            background: #0a0a0f;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .badge.original {
            background: #374151;
            color: #f3f4f6;
        }

        /* ==========================================================================
           FOOTER (Подвал сайта)
           ========================================================================== */
        .site-footer {
            background: #09090d;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 25px 15px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 40px;
        }
        
        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .footer-content span.copyright {
            white-space: nowrap;
        }
        
        .footer-icon {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .footer-icon:hover {
            color: var(--accent-cyan);
            transform: translateY(-2px);
        }
        
        .footer-separator {
            color: #252530;
            font-size: 1.1rem;
        }

        /* ==========================================================================
           МЕДИАЗАПРОСЫ И МОБИЛЬНАЯ ОПТИМИЗАЦИЯ
           ========================================================================== */
        @media (max-width: 1000px) {
            .glass-header {
                padding: 12px 15px;
            }
            .nav-brand {
                font-size: 1.1rem;
            }
            .header-nav {
                gap: 15px;
            }
            
            .gallery-container {
                gap: 20px;
                margin-top: 20px;
                padding: 0 10px;
            }

            .folder-title { font-size: 0.95rem; }
            .image-count { display: none; }

            .folder-row {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 20px;
                box-sizing: border-box;
            }

            .slider-wrapper { width: 100%; min-width: 0; }
            .thumbnails-wrapper { height: 160px; min-height: auto; width: 100%; min-width: 0; }

            /* Принудительно ПОСТОЯННО видимая полоса прокрутки на мобильных устройствах */
            .thumbnails-container {
                position: relative;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                align-items: center;
                padding-bottom: 14px;
                display: flex;
                -webkit-overflow-scrolling: touch;
            }
            
            .thumbnails-container::-webkit-scrollbar {
                height: 6px !important;
                display: block !important;
            }
            
            .thumbnails-container::-webkit-scrollbar-track {
                background: #060609 !important; /* Глубокий темный фон, предотвращающий скрытие скроллбара ОС */
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.03);
            }
            
            .thumbnails-container::-webkit-scrollbar-thumb {
                background: var(--accent-cyan) !important; /* Яркий неоновый ползунок виден постоянно */
                border-radius: 10px;
                box-shadow: 0 0 4px var(--accent-glow);
            }

            .thumbnail-card {
                width: 130px;
                height: 125px;
                flex: 0 0 auto;
                padding: 8px;
            }
            .thumbnail-card img { width: 100%; height: 75px; flex: none; }
            
            /* Исправленная лупа: скругленный квадрат, идеальное позиционирование по центру */
            .zoom-hint { 
                bottom: 10px; 
                right: 10px; 
                width: 32px; 
                height: 32px; 
                opacity: 1; 
                background: rgba(20, 20, 28, 0.95);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: var(--radius-sm); /* Приведение к единому стилю сайта */
                box-shadow: 0 4px 10px rgba(0,0,0,0.4);
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
            }
            
            .zoom-hint svg { 
                width: 15px !important; 
                height: 15px !important; 
                margin: 0 !important; /* Убирает любые смещения иконки */
                display: block;
            }

            .thumbnail-label { font-size: 0.75rem; }
            
            .lb-nav { display: none; }
            .lb-mobile-nav { display: flex; }
            .lb-close { top: 15px; right: 20px; font-size: 35px; }
            .lb-info { top: 15px; }
            .lb-title-text { font-size: 1rem; }
            .lb-filename-text { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="index.html" class="header-left">
            <img src="logo.png" alt="Logo" class="nav-icon" onerror="this.style.display='none'"> 
            <div class="nav-brand">
                <span class="dual">DUAL</span><span class="visor">VISOR</span>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html" class="active">Gallery</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="contacts.html">Contacts</a>
        </nav>
    </header>

    <div class="lightbox" id="lightbox">
        <div class="lb-info">
            <div class="lb-title-text" id="lb-title"></div>
            <div class="lb-filename-text" id="lb-filename"></div>
        </div>
        
        <div class="lb-close" id="lb-close">&times;</div>
        <div class="lb-nav lb-prev" id="lb-prev">&lsaquo;</div>
        <img id="lightbox-img" src="" alt="Full size view">
        <div class="lb-nav lb-next" id="lb-next">&rsaquo;</div>

        <div class="lb-mobile-nav">
            <button id="lb-mobile-prev">&lsaquo; Prev</button>
            <button id="lb-mobile-next">Next &rsaquo;</button>
        </div>
    </div>

    <main class="gallery-container" id="gallery"></main>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="copyright">&copy; 2026 Sergei N.</span>
            <span class="footer-separator">|</span>
            <a href="mailto:esw1337@gmail.com" class="footer-icon" title="Email me">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </a>
            <span class="footer-separator">|</span>
            <a href="https://github.com/youmakemefry-cmd" target="_blank" class="footer-icon" title="GitHub">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            </a>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gallery = document.getElementById('gallery');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lbTitle = document.getElementById('lb-title');
            const lbFilename = document.getElementById('lb-filename');
            
            let globalImages = [];
            let currentLbIndex = -1;

            function openLightbox(src) {
                currentLbIndex = globalImages.findIndex(img => img.src === src);
                if (currentLbIndex === -1) currentLbIndex = 0; 
                updateLightboxImage();
                lightbox.style.display = 'flex';
            }

            function updateLightboxImage() {
                if (currentLbIndex >= 0 && currentLbIndex < globalImages.length) {
                    const currentImg = globalImages[currentLbIndex];
                    lightboxImg.src = currentImg.src;
                    lbTitle.textContent = currentImg.folderTitle;
                    lbFilename.textContent = currentImg.fileName;
                }
            }

            function prevImage() {
                if (currentLbIndex > 0) {
                    currentLbIndex--;
                    updateLightboxImage();
                }
            }

            function nextImage() {
                if (currentLbIndex < globalImages.length - 1) {
                    currentLbIndex++;
                    updateLightboxImage();
                }
            }

            document.getElementById('lb-close').addEventListener('click', () => lightbox.style.display = 'none');
            document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
            document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
            
            document.getElementById('lb-mobile-prev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
            document.getElementById('lb-mobile-next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });

            lightbox.addEventListener('click', (e) => {
                if (e.target.closest('#lb-prev') || e.target.closest('#lb-next') || e.target.closest('.lb-mobile-nav') || e.target.closest('#lb-close')) {
                    return;
                }
                lightbox.style.display = 'none';
            });

            document.addEventListener('keydown', (e) => {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') lightbox.style.display = 'none';
                    if (e.key === 'ArrowLeft') prevImage();
                    if (e.key === 'ArrowRight') nextImage();
                }
            });

            let touchStartX = 0;
            let touchEndX = 0;
            lightbox.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            lightbox.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const threshold = 50; 
                if (touchEndX < touchStartX - threshold) nextImage();
                if (touchEndX > touchStartX + threshold) prevImage();
            }

            async function loadAllFolders() {
                try {
                    const response = await fetch('./gallery.json');
                    if (!response.ok) throw new Error('Cannot load gallery.json');
                    const data = await response.json();
                    
                    const customTitles = data._titles || {};
                    
                    const sortedFolders = Object.keys(data)
                        .filter(key => key !== '_titles')
                        .sort((a, b) => {
                            const partsA = a.split('-');
                            const partsB = b.split('-');
                            const catA = parseInt(partsA[0], 10);
                            const catB = parseInt(partsB[0], 10);
                            
                            if (catA !== catB) return catA - catB;
                            
                            const ratingA = partsA.length > 1 ? parseInt(partsA[1], 10) : 0;
                            const ratingB = partsB.length > 1 ? parseInt(partsB[1], 10) : 0;
                            
                            return ratingA - ratingB;
                        });
                    
                    for (const folderNum of sortedFolders) {
                        const currentTitle = customTitles[folderNum] ? customTitles[folderNum] : `Folder #${folderNum}`;
                        
                        data[folderNum].forEach(img => {
                            globalImages.push({
                                src: `${folderNum}/${img}`,
                                folderTitle: currentTitle,
                                fileName: img
                            });
                        });

                        createFolderBlock(folderNum, data[folderNum], currentTitle);
                    }
                } catch (error) {
                    console.error("Error loading gallery:", error);
                    gallery.innerHTML = '<p style="text-align:center">Error loading gallery.json. Check network tab.</p>';
                }
            }

            function createFolderBlock(folderNum, images, folderTitle) {
                const row = document.createElement('div');
                row.className = 'folder-row';
                
                const header = document.createElement('div');
                header.className = 'folder-header';
                
                const titleWrapper = document.createElement('div');
                titleWrapper.className = 'folder-title-wrapper';
                titleWrapper.setAttribute('data-full-title', folderTitle); 
                
                const title = document.createElement('h3');
                title.className = 'folder-title';
                title.innerHTML = `${folderTitle} <span class="image-count">(${images.length} images)</span>`;
                
                titleWrapper.appendChild(title);
                
                const toggleLabel = document.createElement('label');
                toggleLabel.className = 'toggle-label';
                
                const toggleCheckbox = document.createElement('input');
                toggleCheckbox.type = 'checkbox';
                toggleCheckbox.className = 'toggle-checkbox';
                toggleCheckbox.checked = true;
                
                toggleLabel.append(toggleCheckbox, " Compare");
                header.append(titleWrapper, toggleLabel);
                row.appendChild(header);

                const sliderWrapper = document.createElement('div');
                sliderWrapper.className = 'slider-wrapper';

                const imgOriginal = document.createElement('img');
                imgOriginal.className = 'img-original';
                
                const imgModified = document.createElement('img');
                imgModified.className = 'img-modified';

                const originalSrc = `${folderNum}/${images[0]}`;
                let activeSrc = `${folderNum}/${images[1]}`; 

                imgOriginal.src = originalSrc;
                imgModified.src = activeSrc; 

                let startPos = 50;
                if (window.innerWidth > 1000) {
                    const positions = [25, 35, 50, 65, 75];
                    startPos = positions[Math.floor(Math.random() * positions.length)];
                }

                const sliderLine = document.createElement('div');
                sliderLine.className = 'slider-line';
                sliderLine.style.left = `${startPos}%`;

                const sliderHandle = document.createElement('button');
                sliderHandle.className = 'slider-handle';
                sliderHandle.setAttribute('aria-label', 'Drag comparison handle');
                sliderHandle.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>`;
                sliderLine.appendChild(sliderHandle);
                
                imgModified.style.clipPath = `polygon(${startPos}% 0, 100% 0, 100% 100%, ${startPos}% 100%)`;

                function triggerToggleGlow() {
                    toggleCheckbox.classList.remove('glow-active');
                    void toggleCheckbox.offsetWidth; 
                    toggleCheckbox.classList.add('glow-active');
                }

                function updateDisplayMode() {
                    const allThumbs = thumbContainer.querySelectorAll('.thumbnail-card');
                    const isOriginalActive = allThumbs[0] && allThumbs[0].classList.contains('active');
                    
                    if (isOriginalActive) {
                        toggleCheckbox.checked = false;
                        sliderLine.style.display = 'none';
                        imgModified.style.display = 'none';
                        imgOriginal.src = originalSrc;
                    } else {
                        if (toggleCheckbox.checked) {
                            sliderLine.style.display = 'block';
                            imgModified.style.display = 'block';
                            imgOriginal.src = originalSrc;
                            imgModified.src = activeSrc;
                        } else {
                            sliderLine.style.display = 'none';
                            imgModified.style.display = 'none';
                            imgOriginal.src = activeSrc;
                        }
                    }
                }

                let isDragging = false;

                sliderHandle.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    sliderWrapper.classList.add('is-sliding');
                    sliderHandle.setPointerCapture(e.pointerId);
                });

                sliderHandle.addEventListener('pointermove', (e) => {
                    if (!isDragging) return;
                    const rect = sliderWrapper.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let percent = (x / rect.width) * 100;
                    
                    if (percent < 0) percent = 0;
                    if (percent > 100) percent = 100;
                    
                    sliderLine.style.left = `${percent}%`;
                    imgModified.style.clipPath = `polygon(${percent}% 0, 100% 0, 100% 100%, ${percent}% 100%)`;
                });

                const stopDrag = (e) => {
                    if (isDragging) {
                        isDragging = false;
                        sliderWrapper.classList.remove('is-sliding');
                        try { sliderHandle.releasePointerCapture(e.pointerId); } catch(err) {}
                    }
                };

                sliderHandle.addEventListener('pointerup', stopDrag);
                sliderHandle.addEventListener('pointercancel', stopDrag);

                sliderWrapper.addEventListener('click', (e) => {
                    if (e.target.closest('.slider-handle')) return;
                    
                    const allThumbs = thumbContainer.querySelectorAll('.thumbnail-card');
                    const isOriginalActive = allThumbs[0] && allThumbs[0].classList.contains('active');
                    
                    if (isOriginalActive) return;

                    toggleCheckbox.checked = !toggleCheckbox.checked;
                    triggerToggleGlow();
                    updateDisplayMode();
                });

                toggleCheckbox.addEventListener('change', () => {
                    const allThumbs = thumbContainer.querySelectorAll('.thumbnail-card');
                    const isOriginalActive = allThumbs[0] && allThumbs[0].classList.contains('active');
                    
                    if (isOriginalActive) {
                        toggleCheckbox.checked = false;
                        return;
                    }
                    
                    triggerToggleGlow();
                    updateDisplayMode();
                });

                sliderWrapper.append(imgOriginal, imgModified, sliderLine);
                row.appendChild(sliderWrapper);

                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'thumbnails-wrapper';

                const thumbContainer = document.createElement('div');
                thumbContainer.className = 'thumbnails-container';
                thumbWrapper.appendChild(thumbContainer);
                row.appendChild(thumbWrapper);

                for (let i = 0; i < images.length; i++) {
                    const thumbCard = document.createElement('div');
                    thumbCard.className = 'thumbnail-card';
                    
                    if (i === 1) thumbCard.classList.add('active'); 
                    
                    const label = document.createElement('div');
                    label.className = 'thumbnail-label';
                    
                    const badgeText = i === 0 ? "ORIGINAL" : `AI VARIATION ${i}`;
                    const badgeClass = i === 0 ? "badge original" : "badge";
                    
                    label.innerHTML = `<span class="${badgeClass}">${badgeText}</span>`;
                    
                    const thumbImg = document.createElement('img');
                    const imgPath = `${folderNum}/${images[i]}`;
                    thumbImg.src = imgPath;
                    
                    const zoomHint = document.createElement('div');
                    zoomHint.className = 'zoom-hint';
                    zoomHint.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;

                    thumbCard.append(label, thumbImg, zoomHint);
                    thumbContainer.appendChild(thumbCard);

                    zoomHint.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(imgPath);
                    });

                    thumbCard.addEventListener('click', (e) => {
                        if (e.target.closest('.zoom-hint')) return;

                        const isCurrentlyActive = thumbCard.classList.contains('active');
                        const allThumbs = thumbContainer.querySelectorAll('.thumbnail-card');
                        
                        allThumbs.forEach(t => t.classList.remove('active'));
                        thumbCard.classList.add('active');

                        if (i === 0) {
                            toggleCheckbox.checked = false;
                            triggerToggleGlow();
                            updateDisplayMode();
                        } else {
                            activeSrc = imgPath;
                            if (!isCurrentlyActive) {
                                toggleCheckbox.checked = false;
                            } else {
                                toggleCheckbox.checked = !toggleCheckbox.checked;
                            }
                            triggerToggleGlow();
                            updateDisplayMode();
                        }
                    });
                }

                gallery.appendChild(row);
            }

            loadAllFolders();
        });
    </script>
</body>
