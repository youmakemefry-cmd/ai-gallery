<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts | NEUROVISTA</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1a1a21;
            --accent: #7c3aed;
            --accent-cyan: #00f0ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- GLASS HEADER --- */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(26, 26, 33, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            background: #2d2d38;
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
        }
        .nav-brand .neuro { color: var(--accent-cyan); }
        .nav-brand .vista { color: var(--accent); }

        .header-nav {
            display: flex;
            gap: 25px;
        }

        .header-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-nav a:hover, .header-nav a.active {
            color: var(--text-main);
        }

        .header-nav a.active {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 4px;
        }

        /* --- CONTACTS CONTENT --- */
        .page-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .contact-card h1 {
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .contact-item {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .contact-item span {
            color: var(--text-muted);
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .contact-item a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .contact-item a:hover {
            color: var(--accent);
        }

        /* --- FOOTER --- */
        .site-footer {
            background: #121216;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .site-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }
        .site-footer a:hover {
            color: var(--accent-cyan);
        }
        .footer-content {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 1000px) {
            .glass-header { padding: 12px 15px; }
            .nav-brand { font-size: 1.1rem; }
            .header-nav { gap: 15px; }
            .contact-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <a href="index.html" class="header-left">
            <img src="logo.png" alt="Logo" class="nav-icon" onerror="this.style.display='none'"> 
            <div class="nav-brand">
                <span class="neuro">NEURO</span><span class="vista">VISTA</span>
            </div>
        </a>
        <nav class="header-nav">
            <a href="index.html">Gallery</a>
            <a href="blog.html">Blog</a>
            <a href="contacts.html" class="active">Contacts</a>
        </nav>
    </header>

    <main class="page-container">
        <div class="contact-card">
            <h1>Let's Connect</h1>
            
            <div class="contact-item">
                <span>Developer / Artist</span>
                Sergei N
            </div>
            
            <div class="contact-item">
                <span>Email</span>
                <a href="mailto:esw1337@gmail.com">esw1337@gmail.com</a>
            </div>
            
            <div class="contact-item">
                <span>GitHub</span>
                <a href="https://github.com/youmakemefry-cmd" target="_blank">github.com/youmakemefry-cmd</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <span>&copy; 2026 Sergei N</span>
            <span>|</span>
            <span><a href="mailto:esw1337@gmail.com">esw1337@gmail.com</a></span>
            <span>|</span>
            <span><a href="https://github.com/youmakemefry-cmd" target="_blank">GitHub</a></span>
        </div>
    </footer>

</body>
</html>
